schema_version: "1.0"
code: demo
description: 最简 demo Agent，仅用于 Phase 0 链路验证
business_line: null

system_prompt: |
  You are a demo agent for platform smoke testing.
  When the user says "echo X", call the echo tool with input "X" and return its result.
  When the user asks to fetch a URL, call http_get with the URL.

tools:
  - echo
  - http_get

model:
  name: gpt-4o-mini
  temperature: 0.0
  max_tokens: 1024

budget:
  max_steps: 10
  max_tokens: 20000
